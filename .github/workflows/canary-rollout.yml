name: "Canary Rollout"

on:
  push:
    branches: ["master"]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        required: true
        default: "advance"
        type: choice
        options:
          - start
          - advance
          - abort

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
  TF_INPUT: "false"
  TG_NON_INTERACTIVE: "true"
  ROUTE53_HOSTED_ZONE_ID: ${{ secrets.ROUTE53_HOSTED_ZONE_ID }}
  APP_FQDN: ${{ secrets.APP_FQDN }}

jobs:
  start-canary:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'start')
    runs-on: ubuntu-latest
    concurrency:
      group: canary-rollout
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_version: 1.0.1
          tf_path: terraform

      - name: Validate Terraform
        run: |
          terraform -chdir=infra fmt -check -recursive
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate

      - name: Start Canary Rollout
        run: |
          chmod +x .github/scripts/canary_rollout.sh
          .github/scripts/canary_rollout.sh start

  advance-canary:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'advance')
    runs-on: ubuntu-latest
    concurrency:
      group: canary-rollout
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_version: 1.0.1
          tf_path: terraform

      - name: Advance Canary Rollout
        run: |
          chmod +x .github/scripts/canary_rollout.sh
          .github/scripts/canary_rollout.sh advance

  abort-canary:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'abort'
    runs-on: ubuntu-latest
    concurrency:
      group: canary-rollout
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_version: 1.0.1
          tf_path: terraform

      - name: Abort Canary Rollout
        run: |
          chmod +x .github/scripts/canary_rollout.sh
          .github/scripts/canary_rollout.sh abort
