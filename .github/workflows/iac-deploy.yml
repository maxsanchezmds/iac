name: "IaC Deploy"

on:
  workflow_dispatch:
    inputs:
      apply_transversal:
        description: "Aplicar tambien el stack transversal antes de main"
        required: true
        default: true
        type: boolean
  push:
    branches: ["master"]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TF_INPUT: "false"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_BUCKET_PREFIX: s3-tf-state-smartlogix

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: iac-master-apply
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_version: 1.0.1
          tf_path: terraform

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap Terraform remote state
        run: |
          set -euo pipefail

          account_id="$(aws sts get-caller-identity --query Account --output text)"
          if [ -z "${TF_STATE_BUCKET:-}" ]; then
            TF_STATE_BUCKET="${TF_STATE_BUCKET_PREFIX}-${account_id}-${AWS_REGION}"
          fi
          echo "TF_STATE_BUCKET=$TF_STATE_BUCKET" >> "$GITHUB_ENV"

          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/tmp/tf-state-head-bucket.err; then
            echo "Terraform state bucket already exists: $TF_STATE_BUCKET"
          else
            status=$?
            if grep -qi "Forbidden" /tmp/tf-state-head-bucket.err; then
              echo "S3 bucket $TF_STATE_BUCKET exists, but these AWS credentials cannot access it." >&2
              echo "Use a globally unique TF_STATE_BUCKET value or grant access to this bucket." >&2
              exit "$status"
            fi

            echo "Creating Terraform state bucket: $TF_STATE_BUCKET"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --region "$AWS_REGION"
            else
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --region "$AWS_REGION" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi

            aws s3api wait bucket-exists --bucket "$TF_STATE_BUCKET"
          fi

          aws s3api put-public-access-block \
            --bucket "$TF_STATE_BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-versioning \
            --bucket "$TF_STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$TF_STATE_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

      - name: Verify required deployment secrets
        env:
          MONGODB_INVENTARIO_URI: ${{ secrets.MONGODB_INVENTARIO_URI }}
          CLIENT_VPN_ENABLED: ${{ vars.CLIENT_VPN_ENABLED }}
          CLIENT_VPN_SERVER_CERTIFICATE_ARN: ${{ vars.CLIENT_VPN_SERVER_CERTIFICATE_ARN }}
          CLIENT_VPN_ROOT_CERTIFICATE_ARN: ${{ vars.CLIENT_VPN_ROOT_CERTIFICATE_ARN }}
        run: |
          if [ -z "$MONGODB_INVENTARIO_URI" ]; then
            echo "MONGODB_INVENTARIO_URI repository secret is required for main apply." >&2
            exit 1
          fi

          if [ "$CLIENT_VPN_ENABLED" = "true" ]; then
            if [ -z "$CLIENT_VPN_SERVER_CERTIFICATE_ARN" ] || [ -z "$CLIENT_VPN_ROOT_CERTIFICATE_ARN" ]; then
              echo "CLIENT_VPN_SERVER_CERTIFICATE_ARN and CLIENT_VPN_ROOT_CERTIFICATE_ARN repository variables are required when CLIENT_VPN_ENABLED=true." >&2
              exit 1
            fi
          fi

      - name: Validate Terraform configuration
        run: |
          terraform -chdir=infra fmt -check -recursive
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate

      - name: Apply Transversal
        if: github.event_name != 'workflow_dispatch' || inputs.apply_transversal
        working-directory: environments/transversal
        run: |
          terragrunt --non-interactive init -reconfigure
          terragrunt --non-interactive apply -auto-approve

      - name: Apply Main
        working-directory: environments/main
        env:
          TG_USE_MOCK_DEPENDENCY: "false"
          MONGODB_INVENTARIO_URI: ${{ secrets.MONGODB_INVENTARIO_URI }}
          CLIENT_VPN_ENABLED: ${{ vars.CLIENT_VPN_ENABLED }}
          CLIENT_VPN_SERVER_CERTIFICATE_ARN: ${{ vars.CLIENT_VPN_SERVER_CERTIFICATE_ARN }}
          CLIENT_VPN_ROOT_CERTIFICATE_ARN: ${{ vars.CLIENT_VPN_ROOT_CERTIFICATE_ARN }}
          CLIENT_VPN_CLIENT_CIDR_BLOCK: ${{ vars.CLIENT_VPN_CLIENT_CIDR_BLOCK || '172.16.0.0/22' }}
        run: |
          TF_VAR_mongodb_connection_strings="$(python3 <<'PY'
          import json
          import os

          print(json.dumps({"inventario": os.environ["MONGODB_INVENTARIO_URI"]}))
          PY
          )"
          export TF_VAR_mongodb_connection_strings
          terragrunt --non-interactive init -reconfigure
          terragrunt --non-interactive apply -auto-approve
