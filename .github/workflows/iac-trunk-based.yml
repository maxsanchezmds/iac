name: "IaC Trunk Based Deploy"

on:
  pull_request:
    branches: ["master"]
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  TG_STATE_BUCKET: s3-tf-state-smartlogix-2026
  TG_LOCK_TABLE: dynamo-tfstate-smartlogix-2026
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY_SECRET }}
  TF_INPUT: "false"
  TG_NON_INTERACTIVE: "true"

jobs:
  ephemeral-apply:
    if: github.event_name == 'pull_request' && github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: ephemeral-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_version: 1.0.1
          tf_path: terraform

      - name: Format and Validate Terraform
        run: |
          terraform -chdir=infra fmt -check -recursive
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate

      - name: Ensure remote state backend exists
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "$TG_STATE_BUCKET" 2>/dev/null; then
            echo "State bucket already exists: $TG_STATE_BUCKET"
          else
            echo "Creating state bucket: $TG_STATE_BUCKET"
            aws s3api create-bucket --bucket "$TG_STATE_BUCKET" >/dev/null 2>&1 || true
            aws s3api head-bucket --bucket "$TG_STATE_BUCKET"
            aws s3api put-bucket-versioning \
              --bucket "$TG_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$TG_STATE_BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          if aws dynamodb describe-table --table-name "$TG_LOCK_TABLE" >/dev/null 2>&1; then
            echo "Lock table already exists: $TG_LOCK_TABLE"
          else
            echo "Creating lock table: $TG_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$TG_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST >/dev/null 2>&1 || true
            aws dynamodb wait table-exists --table-name "$TG_LOCK_TABLE"
          fi

      - name: Apply Ephemeral Environment
        working-directory: environments/ephemeral
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          terragrunt init -reconfigure
          terragrunt apply -auto-approve -lock-timeout=5m

  ephemeral-destroy:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: ephemeral-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Setup Terragrunt
        uses: gruntwork-io/terragrunt-action@53dbdc2c3d43e82bf3bae10b734a968196442bec # v3.2.0
        with:
          tg_version: 1.0.1
          tf_path: terraform

      - name: Ensure remote state backend exists
        shell: bash
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "$TG_STATE_BUCKET" 2>/dev/null; then
            echo "State bucket already exists: $TG_STATE_BUCKET"
          else
            echo "Creating state bucket: $TG_STATE_BUCKET"
            aws s3api create-bucket --bucket "$TG_STATE_BUCKET" >/dev/null 2>&1 || true
            aws s3api head-bucket --bucket "$TG_STATE_BUCKET"
            aws s3api put-bucket-versioning \
              --bucket "$TG_STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$TG_STATE_BUCKET" \
              --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          if aws dynamodb describe-table --table-name "$TG_LOCK_TABLE" >/dev/null 2>&1; then
            echo "Lock table already exists: $TG_LOCK_TABLE"
          else
            echo "Creating lock table: $TG_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$TG_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST >/dev/null 2>&1 || true
            aws dynamodb wait table-exists --table-name "$TG_LOCK_TABLE"
          fi

      - name: Destroy Ephemeral Environment
        working-directory: environments/ephemeral
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          terragrunt init -reconfigure
          terragrunt destroy -auto-approve -lock-timeout=5m
